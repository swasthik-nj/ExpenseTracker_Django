{% extends "tracker/base.html" %}

{% block title %}Login | Expense Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-5 col-md-7">
        <div class="card border-0 shadow-sm auth-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-wallet2 fs-1 text-primary"></i>
                    <h3 class="fw-bold mt-2">Welcome Back</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <form method="post" novalidate>
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        Invalid username or password. Please try again.
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-medium">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" id="id_username" class="form-control border-start-0" placeholder="Enter username" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-medium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" id="id_password" class="form-control border-start-0" placeholder="Enter password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-medium">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted mb-0">
                    Don't have an account? <a href="{% url 'register' %}" class="fw-medium text-decoration-none">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

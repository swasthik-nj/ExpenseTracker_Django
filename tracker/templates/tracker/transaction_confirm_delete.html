{% extends "tracker/base.html" %}

{% block title %}Delete Transaction | Expense Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5 text-center">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 3rem;"></i>
                </div>
                <h4 class="fw-bold mb-2">Delete Transaction?</h4>
                <p class="text-muted mb-1">You are about to delete:</p>
                <p class="fw-semibold mb-4">
                    {{ object.type|title }} — ₹{{ object.amount|floatformat:2 }}
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger rounded-pill px-4">
                            <i class="bi bi-trash3 me-1"></i>Yes, Delete
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

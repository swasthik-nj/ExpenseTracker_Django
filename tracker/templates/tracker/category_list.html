{% extends "tracker/base.html" %}

{% block title %}Categories | Expense Tracker{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-tags me-2 text-primary"></i>Categories</h2>
    <a href="{% url 'category-add' %}" class="btn btn-primary rounded-pill">
        <i class="bi bi-plus-lg me-1"></i>Add Category
    </a>
</div>

{% if categories %}
<div class="row g-3">
    {% for cat in categories %}
    <div class="col-md-4 col-sm-6">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-tag-fill text-primary"></i>
                    <span class="fw-medium">{{ cat.name }}</span>
                </div>
                <a href="{% url 'category-delete' cat.pk %}" class="btn btn-sm btn-outline-danger rounded-pill">
                    <i class="bi bi-trash3"></i>
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="card border-0 shadow-sm">
    <div class="card-body text-center py-5">
        <i class="bi bi-tags fs-1 text-muted"></i>
        <h5 class="text-muted fw-normal mt-3">No categories yet</h5>
        <a href="{% url 'category-add' %}" class="btn btn-primary rounded-pill mt-3"><i class="bi bi-plus-lg me-1"></i>Add Category</a>
    </div>
</div>
{% endif %}
{% endblock %}
